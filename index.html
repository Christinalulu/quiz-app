<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
      <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet"/>
    <title>Game Time ✦</title>
</head>
<body>
    
    <main class="phone">

     <div class="start-screen">

        <div class="logo-marks">

            <span class="qmark">?</span>
            <span class="qmark">?</span>
            <span class="qmark">?</span>

        </div>

        <div class="game-title">GAME <br>TIME </div>
        <div class="game-sub">Test your knowledge! <br>5 questions · 15 seconds each </div>
        <button class="start-btn"> START</button>
        <div class="start-badges">
            <span class="badge">⚡ Fast</span>
            <span class="badge">🏆 Highscore</span>
            <span class="badge">🎯 Questions</span>
        </div>
     </div>

      <div class="quiz-screen">
    <div class="quiz-header">
      <div class="q-label">SPØRSMÅL 1/5</div>
      <div class="score-display">⭐ 0</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle class="timer-bg" cx="32" cy="32" r="26"/>
          <circle class="timer-fg" cx="32" cy="32" r="26"/>
        </svg>
        <div class="timer-num">15</div>
      </div>
    </div>
    <div class="char-wrap">
      <span class="char">🤔</span>
    </div>
    <div class="question-wrap">
      <div class="question-card">Spørsmål vises her...</div>
    </div>
    <div class="answers">
      <button class="ans-btn"><span class="ans-letter">A</span>Svaralternativ A</button>
      <button class="ans-btn"><span class="ans-letter">B</span>Svaralternativ B</button>
      <button class="ans-btn correct"><span class="ans-letter">C</span>Slik ser riktig svar ut ✓</button>
      <button class="ans-btn wrong"><span class="ans-letter">D</span>Slik ser feil svar ut ✗</button>
    </div>
  </div>

   <div class="result-screen">
    <div class="result-emoji">🏆</div>
    <div class="result-title">QUIZ<br>FERDIG!</div>
    <div class="score-big">4/5</div>
    <div class="score-label">POENG</div>
    <div class="highscore-label">🏆 HIGHSCORE: 4</div>
    <div class="result-msg">Nesten full pott! Prøv igjen for å slå rekorden.</div>
    <div class="result-btns">
      <button class="btn-primary">PRØV IGJEN</button>
      <button class="btn-secondary">← Tilbake til start</button>
    </div>
  </div>



      


    </main>
   


    <script src="script.js"></script>
</body>
</html>
